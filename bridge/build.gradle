plugins {
    id 'application'
}

def bridgeSpecFile = file("$projectDir/src/main/resources/bridge-api.json")
def goldenCasesFile = file("$rootProject.projectDir/testing/golden/analysis/analysis_cases.json")
def bridgeDocFile = file("$rootProject.projectDir/docs/01_API.md")
def bridgeDocStartMarker = "<!-- BEGIN AUTO-GENERATED: BRIDGE_API -->"
def bridgeDocEndMarker = "<!-- END AUTO-GENERATED: BRIDGE_API -->"

String renderFieldRows(Map properties) {
    properties.collect { String name, Object property ->
        def row = property as Map<String, Object>
        "| `${name}` | ${row.type ?: ''} | ${row.required == true ? '是' : '否'} | ${row.description ?: ''} |"
    }.join('\n')
}

String prettyJson(Object value) {
    def generator = new groovy.json.JsonGenerator.Options().disableUnicodeEscaping().build()
    return groovy.json.JsonOutput.prettyPrint(generator.toJson(value))
            .replaceAll('\\\\u([0-9a-fA-F]{4})') { String match, String hex ->
                Character.toString((char) Integer.parseInt(hex, 16))
            }
}

String renderBridgeSection(Map spec, Map goldenExamples) {
    def lines = []
    lines << "## Bridge CLI"
    lines << ""
    lines << (spec.summary ?: '')
    lines << ""
    lines << "## 传输方式"
    lines << ""
    lines << "- 请求：${spec.transport.request}"
    lines << "- 响应：${spec.transport.response}"
    lines << ""
    lines << "## 请求体"
    lines << ""
    lines << (spec.request.description ?: '')
    lines << ""
    lines << "| 字段 | 类型 | 必填 | 说明 |"
    lines << "|---|---|---|---|"
    lines << renderFieldRows(spec.request.properties as Map<String, Object>)
    lines << ""
    lines << "除 `text` 外，其余字段会按原样传递给 ES-TOK 配置加载器，因此可以直接复用插件 REST 分析接口中的嵌套配置结构。"
    lines << ""
    lines << "## 响应体"
    lines << ""
    lines << "| 字段 | 类型 | 必填 | 说明 |"
    lines << "|---|---|---|---|"
    lines << renderFieldRows(spec.response.properties as Map<String, Object>)
    lines << ""
    lines << "### Token 对象"
    lines << ""
    lines << "| 字段 | 类型 | 必填 | 说明 |"
    lines << "|---|---|---|---|"
    lines << renderFieldRows(((spec.response.properties as Map<String, Object>).tokens as Map<String, Object>).items.properties as Map<String, Object>)
    lines << ""
    lines << "### 版本对象"
    lines << ""
    lines << "| 字段 | 类型 | 必填 | 说明 |"
    lines << "|---|---|---|---|"
    lines << renderFieldRows(((spec.response.properties as Map<String, Object>).version as Map<String, Object>).properties as Map<String, Object>)
    lines << ""
    lines << "## 示例"
    lines << ""
    (spec.examples as List<Map<String, Object>>).each { Map<String, Object> example ->
        def goldenExample = goldenExamples[example.case as String]
        if (goldenExample == null) {
            throw new GradleException("Missing golden case for bridge example: ${example.case}")
        }
        lines << "### ${example.title}"
        lines << ""
        lines << "请求："
        lines << "```json"
        lines << prettyJson(goldenExample.request)
        lines << "```"
        lines << ""
        lines << "响应："
        lines << "```json"
        lines << prettyJson(goldenExample.expected)
        lines << "```"
        lines << ""
    }
    return lines.join('\n').trim() + '\n'
}

String replaceBridgeSection(String document, String generatedSection, String startMarker, String endMarker, File targetFile) {
    int start = document.indexOf(startMarker)
    int end = document.indexOf(endMarker)
    if (start == -1 || end == -1 || end < start) {
        throw new GradleException("Missing bridge doc markers in ${targetFile}. Expected ${startMarker} ... ${endMarker}")
    }

    String before = document.substring(0, start + startMarker.length())
    String after = document.substring(end)
    return before + '\n\n' + generatedSection.trim() + '\n\n' + after
}

def loadGoldenExamples(File goldenCasesFile) {
    def parsed = new groovy.json.JsonSlurper().parse(goldenCasesFile)
    parsed.collectEntries { example ->
        [(example.name): example]
    }
}

application {
    mainClass = 'org.es.tok.bridge.EsTokCliMain'
}

sourceSets {
    test {
        resources {
            srcDir "$rootProject.projectDir/testing"
        }
    }
}

dependencies {
    implementation project(':core')

    testImplementation "junit:junit:4.13.2"
}

tasks.named('jar') {
    manifest {
        attributes 'Main-Class': application.mainClass.get()
    }
}

tasks.register('fatJar', Jar) {
    archiveClassifier = 'all'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': application.mainClass.get()
    }
    from sourceSets.main.output
    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}

tasks.register('generateBridgeDocs') {
    inputs.file bridgeSpecFile
    inputs.file goldenCasesFile
    outputs.file bridgeDocFile

    doLast {
        if (!bridgeDocFile.exists()) {
            throw new GradleException("Missing API doc: ${bridgeDocFile}")
        }
        def spec = new groovy.json.JsonSlurper().parse(bridgeSpecFile) as Map<String, Object>
        def goldenExamples = loadGoldenExamples(goldenCasesFile)
        def generatedSection = renderBridgeSection(spec, goldenExamples)
        def updated = replaceBridgeSection(
            bridgeDocFile.getText('UTF-8'),
            generatedSection,
            bridgeDocStartMarker,
            bridgeDocEndMarker,
            bridgeDocFile)
        bridgeDocFile.parentFile.mkdirs()
        bridgeDocFile.setText(updated, 'UTF-8')
    }
}

tasks.register('verifyBridgeDocs') {
    inputs.file bridgeSpecFile
    inputs.file goldenCasesFile
    inputs.file bridgeDocFile

    mustRunAfter tasks.named('generateBridgeDocs')

    doLast {
        if (!bridgeDocFile.exists()) {
            throw new GradleException("Missing API doc: ${bridgeDocFile}. Run ./gradlew :bridge:generateBridgeDocs")
        }
        def spec = new groovy.json.JsonSlurper().parse(bridgeSpecFile) as Map<String, Object>
        def goldenExamples = loadGoldenExamples(goldenCasesFile)
        def expected = replaceBridgeSection(
                bridgeDocFile.getText('UTF-8'),
            renderBridgeSection(spec, goldenExamples),
            bridgeDocStartMarker,
            bridgeDocEndMarker,
            bridgeDocFile)
        def actual = bridgeDocFile.getText('UTF-8')
        if (actual != expected) {
            throw new GradleException("Bridge API docs are out of date. Run ./gradlew :bridge:generateBridgeDocs")
        }
    }
}

tasks.named('check') {
    dependsOn tasks.named('verifyBridgeDocs')
}